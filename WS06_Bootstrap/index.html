<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Pasin huijaamaton sivu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="content">
        <h1>Heippa ja heipähei!</h1>
        <div class="container">
            <div class="row">
                <div class="col-md-4 col-12">Column 1
                    <button class="btn btn-primary">Primary</button>
                </div>
                <div class="col-md-4 col-12">Column 2
                    <button class="btn btn-success">Success</button>
                </div>
                <div class="col-md-4 col-12">Column 3
                    <button class="btn btn-secondary">Secondary</button>
                </div>
            </div>
        </div>
        <div id="kortit" class="kortit">
            <div class="card" style="width: 15rem;">
                <img src="tyopajakuva.jpg" class="card-img-top" alt="Card Image">
                <div class="card-body">
                    <h5 class="card-title">tämä on kortti</h5>
                    <p class="card-text">tämä kortti on Pasi</p>
                    <a id="add-pasi" href="#" class="btn btn-primary">lisää Paseja</a>
                </div>
            </div>
        </div>


        <div id="huijaus" class="alert alert-success" role="alert">
            Voitit 1000 euroa! <a id="linkki" href="#" class="alert-link">klikkaa tästä</a> lunastaaksesi palkinnon!
        </div>

    </div>
    <script src="javascript.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
